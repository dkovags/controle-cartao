const DOC_PATH="data/main";
async function ld(){
  try{
    const fdb=initFB();
    if(fdb){
      const doc=await fdb.doc(DOC_PATH).get();
      if(doc.exists){
        const d=doc.data();
        if(d?.purchases){
          // Parse JSON strings if stored as strings
          const purchases=typeof d.purchases==="string"?JSON.parse(d.purchases):d.purchases;
          const people=typeof d.people==="string"?JSON.parse(d.people):d.people;
          const baixas=typeof d.baixas==="string"?JSON.parse(d.baixas):d.baixas;
          // Merge seed baixas for missing months
          const bx=baixas||{};
          Object.keys(SEED_BX).forEach(m=>{if(!bx[m])bx[m]=SEED_BX[m];});
          return{purchases,people:people||{},baixas:bx,updatedAt:d.updatedAt||null};
        }
      }
    }
  }catch(e){console.error("Load error:",e);}
  // Fallback: try window.storage
  try{
    const r=await window.storage.get("cc-despesas-v10");
    if(r){const d=JSON.parse(r.value);if(d?.purchases){const bx=d.baixas||{};Object.keys(SEED_BX).forEach(m=>{if(!bx[m])bx[m]=SEED_BX[m];});d.baixas=bx;return d;}}

  return null;
}

}

    list.forEach((b,i)=>{baixasRows.push([m,i+1,b.amount,b.date?fD(b.date):"—"]);});
  });
  if(baixasRows.length>1){const wsB=XLSX.utils.aoa_to_sheet(baixasRows);XLSX.utils.book_append_sheet(wb,wsB,"Baixas");}

  // Aba Resumo Mensal - provisão, baixas, saldo mês, saldo acum por mês
  const resumoRows=[["Mês","Provisão","Baixas","Saldo Mês","Saldo Acum."]];
  const lastSeedM="Fevereiro/2026";const lsi=MO.indexOf(lastSeedM);
  let runAcum=0;
  MO.forEach((m,i)=>{
    const prov=mt[m]||0;
    const bxTotal=(baixas[m]||[]).reduce((s,b)=>s+b.amount,0);
    if(prov===0&&bxTotal===0)return;
    const saldoM=bxTotal-prov;
    if(SEED_ACUM[m]!==undefined){runAcum=SEED_ACUM[m];}
    else if(i>lsi){runAcum+=saldoM;}
    resumoRows.push([m,prov,bxTotal,Math.round(saldoM*100)/100,Math.round(runAcum*100)/100]);
  });
  if(resumoRows.length>1){const wsR=XLSX.utils.aoa_to_sheet(resumoRows);XLSX.utils.book_append_sheet(wb,wsR,"Resumo Mensal");}

  // Aba Terceiros
  const terRows=[["Pessoa","Item","Total Item","Mês","Valor Pago","Data Pgto","Restante"]];
  Object.entries(ppl).forEach(([nome,itens])=>{
    itens.forEach(it=>{
      it.payments.forEach(pay=>{terRows.push([nome,it.item,it.total,pay.month,pay.amount,pay.date?fD(pay.date):"—",it.remaining]);});
    });
  });
  if(terRows.length>1){const wsT=XLSX.utils.aoa_to_sheet(terRows);XLSX.utils.book_append_sheet(wb,wsT,"Terceiros");}

  const hoje=new Date();const ts=`${String(hoje.getDate()).padStart(2,"0")}${String(hoje.getMonth()+1).padStart(2,"0")}${hoje.getFullYear()}`;
  XLSX.writeFile(wb,`CPC_Export_${ts}.xlsx`);
}

function maskMoney(v){
  let d=v.replace(/[^\d,]/g,"");
  const parts=d.split(",");
  if(parts.length>2)d=parts[0]+","+parts.slice(1).join("");
  if(parts.length===2&&parts[1].length>2)d=parts[0]+","+parts[1].slice(0,2);
  const intPart=d.split(",")[0].replace(/\D/g,"");
  const decPart=d.includes(",")?","+d.split(",")[1]:"";
  if(!intPart&&!decPart)return"";
  const formatted=intPart.replace(/\B(?=(\d{3})+(?!\d))/g,".");
  return formatted+decPart;
}
function parseMoney(v){const n=v.replace(/\./g,"").replace(",",".");const f=parseFloat(n);return isNaN(f)?0:f;}
function maskInt(v){const d=v.replace(/\D/g,"");return d===""?"":String(Math.max(1,Math.min(48,parseInt(d)||1)));}
function isValidDate(v){if(!v||v.length!==10)return false;const[dd,mm,yy]=v.split("/");const d=parseInt(dd),m=parseInt(mm),y=parseInt(yy);if(isNaN(d)||isNaN(m)||isNaN(y))return false;if(m<1||m>12||d<1||d>31||y<2020||y>2040)return false;const dt=new Date(y,m-1,d);return dt.getFullYear()===y&&dt.getMonth()===m-1&&dt.getDate()===d;}

  const tp=Object.values(ppl).flat().reduce((s,i)=>s+i.payments.reduce((a,p)=>a+p.amount,0),0);
  const tr=Object.values(ppl).flat().reduce((s,i)=>s+(i.remaining||0),0);

  const addPayment=(person,itemIdx)=>{
    const e={};
    if(!payMonth.trim())e.month="Informe o mês";
    const amt=parseMoney(payAmt);
    if(!payAmt||amt<=0)e.amt="Valor inválido";
    if(!payDate)e.date="Informe a data";
    else if(!isValidDate(payDate))e.date="Data inválida";
    setPayErr(e);
    if(Object.keys(e).length>0)return;

    setPpl(prev=>{
      const updated={...prev};
      const items=[...updated[person]];
      const item={...items[itemIdx]};
      const newPayments=[...item.payments,{month:payMonth.trim(),amount:amt,date:payDate}];
      const totalPaid=newPayments.reduce((s,p)=>s+p.amount,0);
      item.payments=newPayments;
      item.remaining=Math.max(0,Math.round((item.total-totalPaid)*100)/100);
      items[itemIdx]=item;
      updated[person]=items;
      return updated;
    });
    setAddPay(null);setPayMonth("");setPayAmt("");setPayDate("");setPayErr({});
  };

  const is={width:"100%",background:Z.cd2,border:`1px solid ${Z.bd}`,borderRadius:5,padding:"6px 8px",color:Z.tx,fontSize:11,boxSizing:"border-box",fontFamily:Z.ft};
  const ie={...is,borderColor:Z.rd};
  const eS={fontSize:8,color:Z.rd,marginTop:1};

  return(<div>
    <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}><St label="Total Pago" value={fB(tp)} color={Z.gn}/><St label="Restante" value={fB(tr)} color={tr>0?Z.yl:Z.gn}/></div>
    {Object.entries(ppl).map(([n,its])=>{const pp=its.reduce((s,i)=>s+i.payments.reduce((a,p)=>a+p.amount,0),0);const pr=its.reduce((s,i)=>s+(i.remaining||0),0);const isEx=ex===n;
    return(<div key={n} style={{background:Z.cd,border:`1px solid ${Z.bd}`,borderRadius:10,marginBottom:8,overflow:"hidden"}}>
      <div onClick={()=>setEx(isEx?null:n)} style={{padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}><div style={{width:36,height:36,borderRadius:"50%",background:pr===0?Z.gn:`linear-gradient(135deg,${Z.ac3},${Z.ac2})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#fff"}}>{n.charAt(0)}</div><div><div style={{fontSize:13,fontWeight:600}}>{n}</div><div style={{fontSize:10,color:Z.tx3}}>{its.length} {its.length===1?"item":"itens"}</div></div></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:12,fontWeight:600,fontFamily:Z.mn,color:pr===0?Z.gn:Z.yl}}>{pr===0?"Quitado ✓":fB(pr)}</div><div style={{fontSize:9,color:Z.tx3}}>Pago: {fB(pp)}</div></div>
      </div>
      {isEx&&its.map((it,idx)=>{
        const itemPaid=it.payments.reduce((s,p)=>s+p.amount,0);
        const isAddingHere=addPay&&addPay.person===n&&addPay.itemIdx===idx;
        return(<div key={idx} style={{padding:"9px 16px",borderTop:`1px solid ${Z.bd}`,animation:"fi .15s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
          <span style={{fontSize:12,fontWeight:600,color:Z.ac}}>{it.item}</span>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:12,fontFamily:Z.mn}}>{fB(it.total)}</span>
          </div>
        </div>
        <table style={{width:"100%",fontSize:10,borderCollapse:"collapse"}}><thead><tr style={{color:Z.tx3}}><th style={{textAlign:"left",padding:"3px 0"}}>Mês</th><th style={{textAlign:"right",padding:"3px 0"}}>Valor</th><th style={{textAlign:"right",padding:"3px 0"}}>Data</th></tr></thead><tbody>{it.payments.map((p,i)=>(<tr key={i} style={{borderTop:`1px solid ${Z.bd}`}}><td style={{padding:"3px 0"}}>{p.month}</td><td style={{padding:"3px 0",textAlign:"right",fontFamily:Z.mn,color:Z.gn}}>{fB(p.amount)}</td><td style={{padding:"3px 0",textAlign:"right",color:Z.tx3}}>{fD(p.date)}</td></tr>))}</tbody></table>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6,paddingTop:6,borderTop:`1px solid ${Z.bd2}`}}>
          <div style={{fontSize:10}}><span style={{color:Z.tx3}}>Pago: {fB(itemPaid)}</span><span style={{color:Z.tx3,margin:"0 6px"}}>·</span><span style={{color:it.remaining===0?Z.gn:Z.yl,fontWeight:600}}>Resta: {fB(it.remaining)}</span></div>
          {isAdmin&&it.remaining>0&&!isAddingHere&&<button onClick={()=>{setAddPay({person:n,itemIdx:idx});setPayMonth("");setPayAmt("");setPayDate("");setPayErr({});}} style={{background:`${Z.ac3}30`,color:Z.ac,border:`1px solid ${Z.ac3}50`,borderRadius:5,padding:"4px 10px",fontSize:9,fontWeight:600,cursor:"pointer"}}>+ Baixa</button>}
        </div>
        {isAddingHere&&(<div style={{marginTop:8,padding:10,background:Z.cd2,borderRadius:8,border:`1px solid ${Z.bd2}`,animation:"fi .15s ease"}}>
          <div style={{fontSize:10,fontWeight:600,color:Z.ac,marginBottom:8}}>Nova Baixa — {it.item}</div>
          <div className="g3t">
            <div><label style={{fontSize:8,color:Z.tx3,display:"block",marginBottom:1}}>Mês/Ref.</label><input value={payMonth} onChange={e=>{setPayMonth(e.target.value);setPayErr(p=>({...p,month:undefined}));}} placeholder="Ex: Março/2026" style={payErr.month?ie:is}/>{payErr.month&&<div style={eS}>{payErr.month}</div>}</div>
            <div><label style={{fontSize:8,color:Z.tx3,display:"block",marginBottom:1}}>Valor (R$)</label>
              <div style={{position:"relative"}}><span style={{position:"absolute",left:6,top:"50%",transform:"translateY(-50%)",fontSize:9,color:Z.tx3}}>R$</span><input value={payAmt} onChange={e=>{setPayAmt(maskMoney(e.target.value));setPayErr(p=>({...p,amt:undefined}));}} placeholder="0,00" inputMode="decimal" style={{...(payErr.amt?ie:is),paddingLeft:22}}/></div>
              {payErr.amt&&<div style={eS}>{payErr.amt}</div>}
            </div>
            <div><label style={{fontSize:8,color:Z.tx3,display:"block",marginBottom:1}}>Data Pgto</label><input value={payDate} onChange={e=>{setPayDate(maskDate(e.target.value));setPayErr(p=>({...p,date:undefined}));}} placeholder="dd/MM/aaaa" maxLength={10} inputMode="numeric" style={payErr.date?ie:is}/>{payErr.date&&<div style={eS}>{payErr.date}</div>}</div>
          </div>
          <div style={{display:"flex",gap:5,marginTop:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setAddPay(null)} style={{background:Z.bd,color:Z.tx3,border:"none",borderRadius:4,padding:"5px 12px",fontSize:9,cursor:"pointer"}}>Cancelar</button>
            <button onClick={()=>addPayment(n,idx)} style={{background:`linear-gradient(135deg,${Z.ac3},${Z.ac2})`,color:"#fff",border:"none",borderRadius:4,padding:"5px 12px",fontSize:9,fontWeight:600,cursor:"pointer"}}>Registrar Baixa</button>
          </div>
        </div>)}
      </div>);})}
    </div>);})}
  </div>);
}

function BaixasView({baixas,setBaixas,mt,am,isAdmin}){
  const[selM,setSelM]=useState(cmk());
  const[showAdd,setShowAdd]=useState(false);
  const[bAmt,setBAmt]=useState("");
  const[bDate,setBDate]=useState("");
  const[bErr,setBErr]=useState({});

  const mBx=baixas[selM]||[];
  const totalBx=mBx.reduce((s,b)=>s+b.amount,0);
  const prov=mt[selM]||0;
  const saldoMes=totalBx-prov;

  // Saldo acumulado para o mês selecionado
  const calcAcum=(targetM)=>{
    if(SEED_ACUM[targetM]!==undefined){
      return SEED_ACUM[targetM];
    }
    const lastSeedM="Fevereiro/2026";
    const lsi=MO.indexOf(lastSeedM);
    const ti=MO.indexOf(targetM);
    if(ti<=lsi)return 0;
    let a=SEED_ACUM[lastSeedM]||0;
    for(let i=lsi+1;i<=ti;i++){
      const m=MO[i];if(!m)break;
      const p=mt[m]||0;
      const tb=(baixas[m]||[]).reduce((s,b)=>s+b.amount,0);
      a+=(tb-p);
    }
    return Math.round(a*100)/100;
  };
  const saldoAcum=calcAcum(selM);

  const addBx=()=>{
    const e={};
    const amt=parseMoney(bAmt);
    if(!bAmt||amt<=0)e.amt="Valor inválido";
    if(!bDate)e.date="Informe a data";
    else if(!isValidDate(bDate))e.date="Data inválida";
    setBErr(e);
    if(Object.keys(e).length>0)return;
    setBaixas(prev=>{const u={...prev};u[selM]=[...(u[selM]||[]),{amount:amt,date:bDate}];return u;});
    setBAmt("");setBDate("");setShowAdd(false);setBErr({});
  };

  const remBx=(idx)=>{setBaixas(prev=>{const u={...prev};const l=[...(u[selM]||[])];l.splice(idx,1);u[selM]=l;return u;});};

  // Histórico: ignorar os 4 primeiros meses (sem dados), ordenar desc
  const skipMonths=new Set(["Abril/2023","Maio/2023","Junho/2023","Julho/2023"]);
  const allBxMonths=am.filter(m=>!skipMonths.has(m)&&((mt[m]||0)>0||(baixas[m]&&baixas[m].length>0))).reverse();

  const is={width:"100%",background:Z.cd2,border:`1px solid ${Z.bd}`,borderRadius:5,padding:"7px 9px",color:Z.tx,fontSize:11,boxSizing:"border-box",fontFamily:Z.ft};
  const ie={...is,borderColor:Z.rd};
  const eS={fontSize:8,color:Z.rd,marginTop:1};

  return(<div>
    <div className="stat-row" style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:18}}>
      <St label="Provisão do Mês" value={fB(prov)} color={Z.ac}/>
      <St label="Baixas do Mês" value={fB(totalBx)} sub={`${mBx.length} pagamento${mBx.length!==1?"s":""}`} color={Z.gn}/>
      <St label="Saldo do Mês" value={fB(saldoMes)} sub={saldoMes>=0?"Superávit":"Déficit"} color={saldoMes>=0?Z.gn:Z.yl}/>
      <St label="Saldo Acumulado" value={fB(saldoAcum)} sub={saldoAcum>=0?"Quitado":"Devedor"} color={saldoAcum>=0?Z.gn:Z.rd}/>
    </div>

    {/* Seletor de mês + registro */}
    <div style={{background:Z.cd,border:`1px solid ${Z.bd}`,borderRadius:10,padding:16,marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <div style={{fontSize:12,fontWeight:600,color:Z.ac}}>Baixas</div>
          <select value={selM} onChange={e=>{setSelM(e.target.value);setShowAdd(false);}} style={{background:Z.cd2,color:Z.tx,border:`1px solid ${Z.bd}`,borderRadius:6,padding:"5px 8px",fontSize:11,fontFamily:Z.ft,cursor:"pointer"}}>{am.map(m=><option key={m} value={m}>{m}</option>)}</select>
        </div>
        {isAdmin&&!showAdd&&<button onClick={()=>{setShowAdd(true);setBAmt("");setBDate("");setBErr({});}} style={{background:`linear-gradient(135deg,${Z.ac3},${Z.ac2})`,color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontSize:10,fontWeight:600,cursor:"pointer"}}>+ Nova Baixa</button>}
      </div>

      {isAdmin&&showAdd&&(<div style={{padding:12,background:Z.cd2,borderRadius:8,border:`1px solid ${Z.bd2}`,marginBottom:12,animation:"fi .15s ease"}}>
        <div style={{fontSize:10,fontWeight:600,color:Z.ac,marginBottom:8}}>Registrar Baixa — {selM}</div>
        <div className="g3f">
          <div><label style={{fontSize:9,color:Z.tx3,display:"block",marginBottom:2}}>Valor (R$)</label>
            <div style={{position:"relative"}}><span style={{position:"absolute",left:7,top:"50%",transform:"translateY(-50%)",fontSize:10,color:Z.tx3}}>R$</span><input value={bAmt} onChange={e=>{setBAmt(maskMoney(e.target.value));setBErr(p=>({...p,amt:undefined}));}} placeholder="0,00" inputMode="decimal" style={{...(bErr.amt?ie:is),paddingLeft:24}}/></div>
            {bErr.amt&&<div style={eS}>{bErr.amt}</div>}
          </div>
          <div><label style={{fontSize:9,color:Z.tx3,display:"block",marginBottom:2}}>Data do Pagamento</label>
            <input value={bDate} onChange={e=>{setBDate(maskDate(e.target.value));setBErr(p=>({...p,date:undefined}));}} placeholder="dd/MM/aaaa" maxLength={10} inputMode="numeric" style={bErr.date?ie:is}/>
            {bErr.date&&<div style={eS}>{bErr.date}</div>}
          </div>
          <div style={{display:"flex",gap:4}}>
            <button onClick={addBx} style={{background:`linear-gradient(135deg,${Z.ac3},${Z.ac2})`,color:"#fff",border:"none",borderRadius:5,padding:"7px 14px",fontSize:10,fontWeight:600,cursor:"pointer"}}>Registrar</button>
            <button onClick={()=>setShowAdd(false)} style={{background:Z.bd,color:Z.tx3,border:"none",borderRadius:5,padding:"7px 8px",fontSize:10,cursor:"pointer"}}>✕</button>
          </div>
        </div>
      </div>)}

      {/* Baixas do mês selecionado */}
      {mBx.length>0?(<table style={{width:"100%",fontSize:11,borderCollapse:"collapse"}}>
        <thead><tr style={{color:Z.tx3}}><th style={{textAlign:"left",padding:"6px 0",fontWeight:500}}>#</th><th style={{textAlign:"right",padding:"6px 0",fontWeight:500}}>Valor Pago</th><th style={{textAlign:"right",padding:"6px 0",fontWeight:500}}>Data</th><th style={{width:30}}></th></tr></thead>
        <tbody>{mBx.map((b,i)=>(<tr key={i} style={{borderTop:`1px solid ${Z.bd}`}}>
          <td style={{padding:"6px 0",color:Z.tx3}}>{i+1}</td>
          <td style={{padding:"6px 0",textAlign:"right",fontFamily:Z.mn,color:Z.gn,fontWeight:600}}>{fB(b.amount)}</td>
          <td style={{padding:"6px 0",textAlign:"right",color:Z.tx3}}>{b.date?fD(b.date):"—"}</td>
          <td style={{padding:"6px 0",textAlign:"center"}}>{isAdmin&&<button onClick={()=>remBx(i)} style={{background:"none",border:"none",color:Z.rd,fontSize:11,cursor:"pointer",padding:"2px 4px"}}>✕</button>}</td>
        </tr>))}</tbody>
        <tfoot><tr style={{borderTop:`2px solid ${Z.bd2}`}}>
          <td style={{padding:"8px 0",fontWeight:600,color:Z.tx3}}>Total</td>
          <td style={{padding:"8px 0",textAlign:"right",fontFamily:Z.mn,color:Z.gn,fontWeight:700,fontSize:12}}>{fB(totalBx)}</td>
          <td colSpan={2} style={{padding:"8px 0",textAlign:"right",fontSize:10,color:saldoAcum>=0?Z.gn:Z.yl,fontWeight:600}}>{saldoAcum>=0?"Quitado ✓":`Falta: ${fB(Math.abs(saldoAcum))}`}</td>
        </tr></tfoot>
      </table>):(<div style={{color:Z.tx3,fontSize:11,padding:"8px 0"}}>Nenhuma baixa registrada para {selM}</div>)}
    </div>

    {/* Histórico completo */}
    <div style={{background:Z.cd,border:`1px solid ${Z.bd}`,borderRadius:10,padding:16}}>
      <div style={{fontSize:12,fontWeight:600,color:Z.ac,marginBottom:14}}>Histórico de Baixas</div>
      <div style={{maxHeight:400,overflowY:"auto"}}>
        <table style={{width:"100%",fontSize:10,borderCollapse:"collapse"}}>
          <thead style={{position:"sticky",top:0,background:Z.cd}}><tr style={{color:Z.tx3}}>
            <th style={{textAlign:"left",padding:"6px 0",fontWeight:600}}>Mês</th>
            <th style={{textAlign:"right",padding:"6px 0",fontWeight:600}}>Provisão</th>
            <th style={{textAlign:"right",padding:"6px 0",fontWeight:600}}>Baixas</th>
            <th style={{textAlign:"right",padding:"6px 0",fontWeight:600}}>Saldo Mês</th>
            <th style={{textAlign:"right",padding:"6px 0",fontWeight:600}}>Saldo Acum.</th>
            <th style={{textAlign:"center",padding:"6px 0",fontWeight:600}}>Status</th>
          </tr></thead>
          <tbody>{(()=>{
            return allBxMonths.map(m=>{
              const p=mt[m]||0;
              const bxList=baixas[m]||[];
              const tb=bxList.reduce((s,b)=>s+b.amount,0);
              const sl=tb-p;
              const slAcum=calcAcum(m);
              const isCur=m===selM;
              const isQuitado=slAcum>=0;
              return(<tr key={m} onClick={()=>{setSelM(m);setShowAdd(false);}} style={{borderTop:`1px solid ${Z.bd}`,cursor:"pointer",background:isCur?`${Z.ac3}15`:"transparent"}}>
                <td style={{padding:"6px 0",fontWeight:isCur?600:400,color:isCur?Z.ac:Z.tx}}>{m}</td>
                <td style={{padding:"6px 0",textAlign:"right",fontFamily:Z.mn,color:Z.ac}}>{fB(p)}</td>
                <td style={{padding:"6px 0",textAlign:"right",fontFamily:Z.mn,color:tb>0?Z.gn:Z.tx3}}>{fB(tb)}</td>
                <td style={{padding:"6px 0",textAlign:"right",fontFamily:Z.mn,color:sl>=0?Z.gn:Z.yl}}>{fB(sl)}</td>
                <td style={{padding:"6px 0",textAlign:"right",fontFamily:Z.mn,color:slAcum>=0?Z.gn:Z.rd,fontWeight:600}}>{fB(slAcum)}</td>
                <td style={{padding:"6px 0",textAlign:"center"}}>{tb===0&&p===0?"":<>{isQuitado?<span style={{color:Z.gn,fontSize:9,fontWeight:600}}>✓ Quitado</span>:tb>0?<span style={{color:Z.yl,fontSize:9}}>Parcial</span>:<span style={{color:Z.rd,fontSize:9}}>Pendente</span>}</>}</td>
              </tr>);
            });
          })()}</tbody>
        </table>
      </div>
    </div>
  </div>);
}

function Rpts({ps,mt,am}){
  const mx=Math.max(...Object.values(mt),1);
  const sr=useMemo(()=>{const m={};ps.forEach(p=>{m[p.loja]=(m[p.loja]||0)+p.total;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);},[ps]);
  return(<div>
    <div style={{background:Z.cd,border:`1px solid ${Z.bd}`,borderRadius:10,padding:18,marginBottom:18}}>
      <div style={{fontSize:11,fontWeight:600,color:Z.ac,marginBottom:12}}>Histórico Completo</div>
      <div className="chart-wrap" style={{display:"flex",alignItems:"flex-end",gap:1,height:160,overflowX:"auto",paddingBottom:20}}>
        {am.filter(m=>mt[m]>0).map(m=>{const v=mt[m]||0;const h=Math.max(3,(v/mx)*140);const p=pmk(m);return(<div key={m} style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:18,flex:"0 0 auto"}}><span style={{fontSize:6,color:Z.tx3,marginBottom:1,fontFamily:Z.mn}}>{v>999?`${(v/1e3).toFixed(0)}k`:""}</span><div style={{width:14,height:h,background:`linear-gradient(180deg,${Z.ac2},${Z.ac3}80)`,borderRadius:"2px 2px 1px 1px"}} title={`${m}: ${fB(v)}`}/><span style={{fontSize:6,color:Z.tx3,marginTop:1,writingMode:"vertical-rl",transform:"rotate(180deg)",height:32}}>{p?`${MS[p.month]}/${String(p.year).slice(2)}`:""}</span></div>);})}
      </div>
    </div>
    <div className="g2">
      <div style={{background:Z.cd,border:`1px solid ${Z.bd}`,borderRadius:10,padding:16}}><div style={{fontSize:11,fontWeight:600,color:Z.ac,marginBottom:12}}>Ranking Lojas</div><div style={{maxHeight:360,overflowY:"auto"}}>{sr.map(([l,t],i)=>(<div key={l} style={{marginBottom:7}}><div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:2}}><span><span style={{color:Z.tx3,marginRight:4}}>{i+1}.</span>{l}</span><span style={{fontFamily:Z.mn,color:Z.ac}}>{fB(t)}</span></div><div style={{height:3,background:Z.bd,borderRadius:1}}><div style={{height:"100%",background:`hsl(${265-i*6},65%,${58-i}%)`,borderRadius:1,width:`${(t/sr[0][1])*100}%`}}/></div></div>))}</div></div>
      <div style={{background:Z.cd,border:`1px solid ${Z.bd}`,borderRadius:10,padding:16}}><div style={{fontSize:11,fontWeight:600,color:Z.ac,marginBottom:12}}>Resumo Geral</div>
        {[["Total Compras",ps.length.toString()],["Valor Total",fB(ps.reduce((s,p)=>s+p.total,0))],["Lojas",new Set(ps.map(p=>p.loja)).size.toString()],["Ticket Médio",fB(ps.reduce((s,p)=>s+p.total,0)/ps.length)],["Maior Compra",fB(Math.max(...ps.map(p=>p.total)))],["Média Parcelas",(ps.reduce((s,p)=>s+p.parcelas,0)/ps.length).toFixed(1)+"x"]].map(([l,v])=>(<div key={l} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${Z.bd}`,fontSize:11}}><span style={{color:Z.tx3}}>{l}</span><span style={{fontWeight:600,fontFamily:Z.mn}}>{v}</span></div>))}
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
